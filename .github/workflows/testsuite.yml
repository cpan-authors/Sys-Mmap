name: testsuite

on:
  push:
    branches:
      - "*"
    tags-ignore:
      - "*"
  pull_request:

jobs:
  ubuntu:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - name: Makefile.PL
        run: perl Makefile.PL
      - name: make
        run: make
      - name: make test
        run: make test

  disttest:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - name: Makefile.PL
        run: perl Makefile.PL
      - name: make disttest
        run: make disttest

  perl-versions:
    runs-on: ubuntu-latest
    needs: [ubuntu, disttest]
    name: List Perl versions
    outputs:
      perl-versions: ${{ steps.action.outputs.perl-versions }}
    steps:
      - id: action
        uses: perl-actions/perl-versions@v1
        with:
          since-perl: 5.8
          with-devel: true

  linux:
    name: "Perl ${{ matrix.perl-version }}"
    needs: [perl-versions]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson(needs.perl-versions.outputs.perl-versions) }}

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - run: perl Makefile.PL
      - run: make
      - run: make test

  coverage:
    needs: [ubuntu]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Install coverage dependencies
        uses: perl-actions/install-with-cpm@v2
        with:
          install: |
            Devel::Cover
            JSON::MaybeXS
      - name: Build with coverage flags
        run: |
          perl Makefile.PL OPTIMIZE="-g -O0 --coverage -fprofile-arcs -ftest-coverage" \
            LDDLFLAGS="-shared --coverage"
          make
      - name: Run tests with Devel::Cover
        run: |
          HARNESS_PERL_SWITCHES="-MDevel::Cover=-coverage,statement,branch,condition,subroutine,+ignore,^t/,+ignore,^xt/" \
            make test
      - name: Generate Perl coverage report
        run: |
          cover -report text
          cover -report json
      - name: Generate XS/C coverage report
        run: |
          find . -name '*.gcno' -o -name '*.gcda' | head -5
          lcov --capture --directory . --output-file xs_coverage.lcov --rc lcov_branch_coverage=1 || true
          lcov --remove xs_coverage.lcov '/usr/*' --output-file xs_coverage.lcov --rc lcov_branch_coverage=1 || true
          lcov --list xs_coverage.lcov || true
      - name: Upload Perl coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cover_db/cover.json
          flags: perl
          name: perl-coverage
        continue-on-error: true
      - name: Upload XS/C coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: xs_coverage.lcov
          flags: xs
          name: xs-coverage
        continue-on-error: true

  macOS:
    needs: [ubuntu, linux]
    runs-on: macos-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - run: perl Makefile.PL
      - run: make
      - run: make test
